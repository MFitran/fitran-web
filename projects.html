    <script>
        function parseProjectsCSV(text) {
            const lines = text.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim());

            for(let i = 1; i < lines.length; i++){
                if(!lines[i].trim()) continue;
                const obj = {};
                let currentline = [];
                let inQuotes = false;
                let val = '';
                for(let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        currentline.push(val);
                        val = '';
                    } else {
                        val += char;
                    }
                }
                currentline.push(val);
                
                for(let j=0; j<headers.length; j++){
                    let value = currentline[j] ? currentline[j].trim() : '';
                    if(value.startsWith('"') && value.endsWith('"')) {
                        value = value.substring(1, value.length - 1);
                    }
                    value = value.replace(/""/g, '"');
                    obj[headers[j]] = value;
                }
                result.push(obj);
            }
            return result;
        }

        async function loadProjects() {
            try {
                const response = await fetch('assets/scrape_script/github_repos.csv');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const csvText = await response.text();
                const repos = parseProjectsCSV(csvText);
                
                const grid = document.getElementById('projects-grid');
                grid.innerHTML = ''; 
                
                if (repos.length === 0) {
                    grid.innerHTML = '<p>No projects found in CSV.</p>';
                    return;
                }

                repos.forEach(repo => {
                    const card = document.createElement('a');
                    card.href = repo.html_url || '#';
                    card.target = '_blank';
                    card.className = 'hub-box box';
                    card.style.alignItems = 'flex-start';
                    card.style.height = '100%';
                    
                    const title = document.createElement('h3');
                    title.textContent = repo.name || 'Untitled';
                    
                    const language = document.createElement('span');
                    language.textContent = (repo.language && repo.language !== 'null' && repo.language !== '') ? repo.language : 'Mixed';
                    language.style.fontSize = '0.8em';
                    language.style.color = '#A0A0A0';
                    language.style.backgroundColor = '#222';
                    language.style.padding = '2px 6px';
                    language.style.borderRadius = '4px';
                    language.style.marginTop = '4px';

                    const desc = document.createElement('p');
                    desc.textContent = (repo.description && repo.description !== 'null' && repo.description !== '') ? repo.description : 'No description available.';
                    desc.style.marginTop = '10px';
                    desc.style.flexGrow = '1';
                    
                    const stats = document.createElement('div');
                    stats.className = 'post-stats';
                    stats.style.marginTop = '15px';
                    stats.innerHTML = `⭐ ${repo.stargazers_count || 0}`;
                    
                    card.appendChild(title);
                    card.appendChild(language);
                    card.appendChild(desc);
                    card.appendChild(stats);
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading projects:", error);
                document.getElementById('projects-grid').innerHTML = `<p style="color: red;">Error loading projects: ${error.message}</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
